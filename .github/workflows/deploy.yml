name: Deploy to Supabase

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-22.04

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── التحقق من Secrets ──
      - name: Verify Secrets exist
        run: |
          echo "Checking secrets..."
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then echo "❌ SUPABASE_ACCESS_TOKEN missing"; exit 1; fi
          echo "✅ SUPABASE_ACCESS_TOKEN exists"
          
          if [ -z "$SUPABASE_PROJECT_ID" ]; then echo "❌ SUPABASE_PROJECT_ID missing"; exit 1; fi
          echo "✅ SUPABASE_PROJECT_ID exists"
          
          if [ -z "$SUPABASE_DB_URL" ]; then echo "❌ SUPABASE_DB_URL missing"; exit 1; fi
          echo "✅ SUPABASE_DB_URL exists"

      # ── تثبيت Supabase CLI ──
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify CLI version
        run: supabase --version

      # ── تعطيل IPv6 ──
      - name: Disable IPv6
        run: |
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1

      # ── استخراج كلمة المرور من URL ──
      - name: Extract DB password from URL
        id: extract_password
        run: |
          # postgresql://postgres:PASSWORD@db.xxx.supabase.co:5432/postgres
          DB_PASSWORD=$(echo "$SUPABASE_DB_URL" | sed -n 's/.*:\/\/postgres:\([^@]*\)@.*/\1/p')
          
          if [ -z "$DB_PASSWORD" ]; then
            echo "❌ Failed to extract password from SUPABASE_DB_URL"
            echo "URL format: postgresql://postgres:PASSWORD@host..."
            exit 1
          fi
          
          echo "✅ Password extracted successfully"
          echo "DB_PASSWORD=$DB_PASSWORD" >> $GITHUB_ENV

      # ── ربط المشروع ──
      - name: Link to Supabase project
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$DB_PASSWORD"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ── نشر Migrations ──
      - name: Deploy database migrations
        run: |
          supabase db push --password "$DB_PASSWORD"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ── نشر Edge Functions ──
      - name: Deploy Edge Functions
        run: |
          supabase functions deploy --project-ref "$SUPABASE_PROJECT_ID"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ── التحقق ──
      - name: Verify deployment
        run: |
          echo "✅ Migrations deployed"
          echo "✅ Edge Functions deployed"
          supabase functions list --project-ref "$SUPABASE_PROJECT_ID"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
